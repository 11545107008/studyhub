# 部署到 Fly.io

app = "studyhub-api"
primary_region = "hkg"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  image = "node:22-alpine"

[experimental]
  auto_rollback = true

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[services]]
  protocol = "tcp"
  internal_port = 3030
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    method = "get"
    path = "/api/health"
